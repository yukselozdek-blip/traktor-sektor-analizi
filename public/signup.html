<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abone Ol - Traktör Sektör Analizi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #38bdf8;
            --primary-rgb: 56, 189, 248;
            --bg: #020617;
            --surface: rgba(15, 23, 42, 0.85);
            --border: rgba(148, 163, 184, 0.18);
            --text: #f8fafc;
            --muted: #94a3b8;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Manrope', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(var(--primary-rgb), 0.18), transparent 32%),
                radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.12), transparent 28%),
                linear-gradient(135deg, #020617 0%, #0f172a 48%, #111827 100%);
        }
        .signup-shell {
            max-width: 1180px;
            margin: 0 auto;
            padding: 32px 20px;
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(360px, 0.9fr);
            gap: 28px;
        }
        @media (max-width: 980px) {
            .signup-shell { grid-template-columns: 1fr; }
        }
        .signup-hero {
            padding: 28px;
            border-radius: 22px;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.92), rgba(15, 23, 42, 0.78));
        }
        .signup-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 999px;
            background: rgba(var(--primary-rgb), 0.18);
            border: 1px solid rgba(var(--primary-rgb), 0.4);
            color: var(--primary);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }
        .signup-hero h1 {
            margin: 14px 0 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 30px;
            line-height: 1.2;
        }
        .signup-hero p {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
            margin: 0 0 16px;
        }
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 14px;
        }
        @media (max-width: 700px) {
            .plans-grid { grid-template-columns: 1fr; }
        }
        .plan-card {
            padding: 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(2, 6, 23, 0.5);
            cursor: pointer;
            transition: border-color 0.18s, transform 0.16s;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .plan-card:hover { transform: translateY(-2px); border-color: rgba(var(--primary-rgb), 0.5); }
        .plan-card.is-active {
            border-color: var(--primary);
            box-shadow: 0 12px 28px rgba(2, 8, 23, 0.4);
            background: linear-gradient(180deg, rgba(var(--primary-rgb), 0.12), rgba(2, 6, 23, 0.6));
        }
        .plan-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 800;
        }
        .plan-tier {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .plan-price {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
        }
        .plan-price small {
            font-size: 12px;
            color: var(--muted);
            font-weight: 600;
        }
        .plan-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
        .plan-features { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; }
        .plan-features li { font-size: 12px; color: #cbd5e1; display: flex; gap: 6px; align-items: flex-start; }
        .plan-features i { color: #22c55e; margin-top: 2px; }

        .signup-panel {
            padding: 28px;
            border-radius: 22px;
            border: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .signup-panel h2 {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .field label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .field input, .field select {
            padding: 11px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(2, 6, 23, 0.6);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
        }
        .field input:focus, .field select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.18);
        }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .signup-btn {
            margin-top: 8px;
            padding: 13px 18px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(180deg, rgba(var(--primary-rgb), 0.95), rgba(var(--primary-rgb), 0.78));
            color: #0b1220;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.16s, box-shadow 0.16s;
        }
        .signup-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(var(--primary-rgb), 0.32); }
        .signup-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .error-msg {
            padding: 10px 14px;
            border-radius: 10px;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.32);
            color: #fca5a5;
            font-size: 13px;
            display: none;
        }
        .signup-foot {
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            margin-top: 4px;
        }
        .signup-foot a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="signup-shell">
        <section class="signup-hero">
            <span class="signup-pill"><i class="fas fa-bolt"></i> 3 Paket · Anında Aktivasyon</span>
            <h1>Türkiye Traktör Pazarı sizin için saniyeler içinde açılıyor</h1>
            <p>Markanızı seçin, ihtiyacınıza uygun paketi seçin ve kart, banka havalesi veya iyzico ile ödemenizi tamamlayın. Aboneliğiniz onay anında aktif olur.</p>
            <div class="plans-grid" id="plansGrid"></div>
        </section>

        <section class="signup-panel">
            <h2>Üyelik bilgileri</h2>
            <div class="error-msg" id="errorMsg"></div>
            <form id="signupForm">
                <div class="field">
                    <label>Ad ve Soyad</label>
                    <input type="text" name="full_name" required placeholder="Mehmet Demir">
                </div>
                <div class="field-row">
                    <div class="field">
                        <label>E-posta</label>
                        <input type="email" name="email" required placeholder="ornek@firma.com">
                    </div>
                    <div class="field">
                        <label>Telefon</label>
                        <input type="tel" name="phone" placeholder="+90 5xx xxx xx xx">
                    </div>
                </div>
                <div class="field">
                    <label>Şifre (en az 8 karakter)</label>
                    <input type="password" name="password" required minlength="8">
                </div>
                <div class="field-row">
                    <div class="field">
                        <label>Şirket</label>
                        <input type="text" name="company_name" placeholder="ABC Ltd.">
                    </div>
                    <div class="field">
                        <label>Şehir</label>
                        <input type="text" name="city" placeholder="Konya">
                    </div>
                </div>
                <div class="field">
                    <label>Marka</label>
                    <select name="brand_id" id="brandSelect" required>
                        <option value="">Marka seçin...</option>
                    </select>
                </div>
                <div class="field">
                    <label>Seçili Plan</label>
                    <input type="text" id="selectedPlanLabel" readonly value="Önce sol panelden bir plan seçin">
                </div>
                <button type="submit" class="signup-btn" id="btnSignup" disabled>
                    <i class="fas fa-check-circle"></i>
                    <span>Aboneliği Başlat</span>
                </button>
            </form>
            <div class="signup-foot">Zaten üye misiniz? <a href="/login.html">Giriş yapın</a></div>
        </section>
    </div>

    <script src="api_v3.js?v=5.78-mc"></script>
    <script>
        let allPlans = [];
        let selectedPlanSlug = null;

        async function loadInitialData() {
            try {
                const [plans, brandsRes] = await Promise.all([
                    fetch('/api/plans').then(r => r.json()),
                    fetch('/api/brand-portals/directory').then(r => r.json()).catch(() => [])
                ]);
                allPlans = plans;
                renderPlans(plans);
                renderBrands(brandsRes);
            } catch (err) {
                showError('Sistem verisi yüklenemedi. Sayfayı yenileyin.');
            }
        }

        function renderPlans(plans) {
            const grid = document.getElementById('plansGrid');
            grid.innerHTML = plans.map(p => {
                const features = (() => { try { return typeof p.features === 'string' ? JSON.parse(p.features) : (p.features || []); } catch (e) { return []; } })();
                return `
                    <div class="plan-card" data-slug="${p.slug}" onclick="selectPlan('${p.slug}')">
                        <div class="plan-tier">Tier ${p.tier_rank || 1}</div>
                        <div class="plan-name">${escapeHtml(p.name)}</div>
                        <div class="plan-price">₺${formatNumber(p.price_monthly)}<small>/ay</small></div>
                        <div class="plan-desc">${escapeHtml(p.description || '')}</div>
                        <ul class="plan-features">
                            ${features.slice(0, 5).map(f => `<li><i class="fas fa-check"></i><span>${escapeHtml(f)}</span></li>`).join('')}
                        </ul>
                    </div>
                `;
            }).join('');

            // Default Pro plan seçili
            const defaultSlug = plans.find(p => p.slug === 'pro')?.slug || plans[0]?.slug;
            if (defaultSlug) selectPlan(defaultSlug);
        }

        function renderBrands(directory) {
            const sel = document.getElementById('brandSelect');
            const list = (Array.isArray(directory) ? directory : []).slice().sort((a, b) => (a.name || '').localeCompare(b.name || '', 'tr'));
            sel.innerHTML = '<option value="">Marka seçin...</option>' +
                list.map(b => `<option value="${b.id}">${escapeHtml(b.name)}</option>`).join('');
        }

        function selectPlan(slug) {
            selectedPlanSlug = slug;
            document.querySelectorAll('.plan-card').forEach(el => {
                el.classList.toggle('is-active', el.dataset.slug === slug);
            });
            const plan = allPlans.find(p => p.slug === slug);
            document.getElementById('selectedPlanLabel').value = plan ? `${plan.name} — ₺${formatNumber(plan.price_monthly)}/ay` : '';
            document.getElementById('btnSignup').disabled = !slug;
        }

        function escapeHtml(str) {
            return String(str || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function formatNumber(n) {
            return new Intl.NumberFormat('tr-TR').format(Number(n) || 0);
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        document.getElementById('signupForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const btn = document.getElementById('btnSignup');
            const errorEl = document.getElementById('errorMsg');
            errorEl.style.display = 'none';
            if (!selectedPlanSlug) { showError('Önce bir plan seçin'); return; }
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Hesap oluşturuluyor...</span>';

            const fd = new FormData(event.target);
            const payload = {
                email: fd.get('email').trim().toLowerCase(),
                password: fd.get('password'),
                full_name: fd.get('full_name').trim(),
                brand_id: Number(fd.get('brand_id')),
                phone: fd.get('phone') || null,
                company_name: fd.get('company_name') || null,
                city: fd.get('city') || null,
                plan_slug: selectedPlanSlug
            };

            try {
                const data = await API.signup(payload);
                if (data?.token) {
                    // Yönlendirme: ödeme sayfasına geç (Subscription tab'ı checkout başlatır)
                    window.location.href = `/?page=subscription&plan=${selectedPlanSlug}&billing=start`;
                } else {
                    showError('Kayıt yapıldı ancak oturum açılamadı. Giriş yapmayı deneyin.');
                    btn.disabled = false;
                }
            } catch (err) {
                showError(err.message || 'Kayıt başarısız');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check-circle"></i><span>Aboneliği Başlat</span>';
            }
        });

        loadInitialData();
    </script>
</body>
</html>
