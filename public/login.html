<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - Traktör Sektör Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            color: #fff;
        }
        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header .logo-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .login-header h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-header p {
            color: #94a3b8;
            font-size: 14px;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96,165,250,0.15);
        }
        .form-group input::placeholder { color: #475569; }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(37,99,235,0.3);
        }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-msg {
            display: none;
            padding: 12px;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 8px;
            color: #fca5a5;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .brand-logos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
            opacity: 0.4;
        }
        .brand-logos span {
            font-size: 10px;
            padding: 4px 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .demo-info {
            margin-top: 24px;
            padding: 16px;
            background: rgba(52,211,153,0.1);
            border: 1px solid rgba(52,211,153,0.2);
            border-radius: 10px;
            font-size: 12px;
            color: #6ee7b7;
        }
        .demo-info strong { color: #34d399; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">🚜</div>
            <h1>Traktör Sektör Analizi</h1>
            <p>Marka Bazlı Dashboard & AI Analiz Platformu</p>
        </div>

        <div class="login-card">
            <div class="error-msg" id="errorMsg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>E-posta Adresi</label>
                    <input type="email" id="email" placeholder="ornek@marka.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="password" placeholder="Şifrenizi girin" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login" id="btnLogin">
                    <i class="fas fa-sign-in-alt"></i> Giriş Yap
                </button>
            </form>

            <div class="demo-info">
                <strong>Demo Giriş:</strong><br>
                Admin: admin@traktorsektoranalizi.com / admin2024<br>
                Marka: demo@john-deere.com / demo2024
            </div>
        </div>

        <div class="brand-logos">
            <span>BAŞAK</span><span>CASE IH</span><span>DEUTZ-FAHR</span><span>ERKUNT</span>
            <span>HATTAT</span><span>JOHN DEERE</span><span>KUBOTA</span><span>LANDINI</span>
            <span>MASSEY FERGUSON</span><span>NEW HOLLAND</span><span>SAME</span><span>TÜMOSAN</span>
            <span>SOLIS</span><span>FENDT</span><span>VALTRA</span><span>CLAAS</span>
        </div>
    </div>

    <script src="api_v3.js?v=5.0"></script>
    <script>
        // Eski/bozuk token varsa önce doğrula, geçersizse temizle
        if (API.token) {
            API.me().then(user => {
                if (user) window.location.href = '/';
                else { localStorage.removeItem('auth_token'); localStorage.removeItem('user_data'); API.token = null; }
            }).catch(() => { localStorage.removeItem('auth_token'); localStorage.removeItem('user_data'); API.token = null; });
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const errEl = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Giriş yapılıyor...';
            errEl.style.display = 'none';

            try {
                const data = await API.login(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
                if (data?.token) {
                    window.location.href = '/';
                }
            } catch (err) {
                errEl.textContent = err.message || 'Giriş başarısız';
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Giriş Yap';
            }
        });
    </script>
</body>
</html>
