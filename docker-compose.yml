version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: traktor-postgres
    environment:
      POSTGRES_USER: traktor
      POSTGRES_PASSWORD: traktor2024secure
      POSTGRES_DB: traktorsektordb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traktor -d traktorsektordb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: traktor-app
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3002}
      DATABASE_URL: postgresql://traktor:traktor2024secure@postgres:5432/traktorsektordb
      JWT_SECRET: ${JWT_SECRET:-traktor-sektor-super-secret-key-2024}
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_MODEL_INTEL_WEBHOOK_URL: ${N8N_MODEL_INTEL_WEBHOOK_URL}
      MEDIA_WATCH_WEBHOOK_KEY: ${MEDIA_WATCH_WEBHOOK_KEY}
      MODEL_IMAGE_BRIDGE_URL: ${MODEL_IMAGE_BRIDGE_URL:-http://host.docker.internal:3012}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY}
      WHATSAPP_QUERY_API_KEY: ${WHATSAPP_QUERY_API_KEY}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      IYZICO_API_KEY: ${IYZICO_API_KEY}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY}
      IYZICO_BASE_URL: ${IYZICO_BASE_URL}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./public:/app/public
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: traktor-n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-n8n2024secure}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=traktorsektordb
      - DB_POSTGRESDB_USER=traktor
      - DB_POSTGRESDB_PASSWORD=traktor2024secure
      - DB_POSTGRESDB_SCHEMA=n8n
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - GENERIC_TIMEZONE=Europe/Istanbul
      - TZ=Europe/Istanbul
      - WEBHOOK_URL=http://n8n:5678/
      - APP_BASE_URL=${APP_BASE_URL:-http://app:3000}
      - MEDIA_WATCH_WEBHOOK_KEY=${MEDIA_WATCH_WEBHOOK_KEY}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_BUSINESS_ACCOUNT_ID=${WHATSAPP_BUSINESS_ACCOUNT_ID}
      - WHATSAPP_QUERY_API_KEY=${WHATSAPP_QUERY_API_KEY}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5680:5678"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/workflows
    restart: unless-stopped

  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: traktor-anythingllm
    environment:
      - STORAGE_DIR=/app/server/storage
      - SERVER_PORT=3001
    ports:
      - "3001:3001"
    volumes:
      - anythingllm_data:/app/server/storage
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:
  anythingllm_data:
